{{- include "application.validateRedis" . -}}
{{- template "common.deployment" (list . "application.deployment") -}}
{{- define "application.deployment" -}}
{{- $secrets := default (dict) .Values.secrets -}}
{{- $mountAsFiles := default (dict) $secrets.mountAsFiles -}}
{{- /*
  The common library's container.tpl handles:
  - image, ports, args, command (from .Values.args, .Values.command)
  - envFrom (configMapRef + shared configs/secrets)
  - env (.Values.env)
  - secretRefs (.Values.secretRefs → valueFrom.secretKeyRef)
  - health checks (.Values.healthCheck)
  - resources (.Values.resources)
  - volumeMounts (.Values.volumeMounts)
  
  We only need to override for:
  1. secrets.externalSecretName (bulk secretRef in envFrom) — when NOT mounting as files
  2. secrets.mountAsFiles (volume + volumeMount + env vars) — K8s secrets provider
*/ -}}
{{- if or (and $secrets.externalSecretName (not $mountAsFiles.enabled)) (and $secrets.externalSecretName $mountAsFiles.enabled) }}
spec:
  template:
    spec:
      containers:
        - name: app
          image: "{{ default "ghcr.io/mlflow-oidc" .Values.image.registry }}/{{ .Values.image.name }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ default "IfNotPresent" .Values.image.pullPolicy }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: {{ default "http" .Values.config.portName }}
              containerPort: {{ default "8080" .Values.config.port }}
              protocol: TCP
          {{- if $mountAsFiles.enabled }}
          env:
            - name: CONFIG_K8S_SECRETS_ENABLED
              value: "true"
            - name: CONFIG_K8S_SECRETS_PATH
              value: {{ $mountAsFiles.path | default "/var/run/secrets/mlflow-oidc-auth" | quote }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- range $envName, $ref := .Values.secretRefs }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.name }}
                  key: {{ $ref.key }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ template "common.fullname" . }}
            {{ include "common.envvar.shared.configs" . | indent 12 }}
            {{ include "common.envvar.shared.secrets" . | indent 12 }}
          volumeMounts:
            - name: mlflow-secrets
              mountPath: {{ $mountAsFiles.path | default "/var/run/secrets/mlflow-oidc-auth" }}
              readOnly: true
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- else }}
          {{- /* Not mounting as files — inject external secret as envFrom */}}
          {{- if or .Values.env .Values.secretRefs }}
          env:
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- range $envName, $ref := .Values.secretRefs }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.name }}
                  key: {{ $ref.key }}
            {{- end }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ template "common.fullname" . }}
            - secretRef:
                name: {{ $secrets.externalSecretName }}
            {{ include "common.envvar.shared.configs" . | indent 12 }}
            {{ include "common.envvar.shared.secrets" . | indent 12 }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- $healthCheck := default (dict) .Values.healthCheck -}}
          {{- if eq $healthCheck.kind "tcp" }}
          {{ include "common.healthcheck.liveness.tcp" . | nindent 10 }}
          {{ include "common.healthcheck.readiness.tcp" . | nindent 10 }}
          {{ include "common.healthcheck.startup.tcp" . | nindent 10 }}
          {{- else if eq $healthCheck.kind "disabled" }}
          {{- else }}
          {{ include "common.healthcheck.liveness" . | nindent 10 }}
          {{ include "common.healthcheck.readiness" . | nindent 10 }}
          {{ include "common.healthcheck.startup" . | nindent 10 }}
          {{- end }}
          {{ include "common.resources" . | nindent 10 }}
      {{- if or (and $secrets.externalSecretName $mountAsFiles.enabled) .Values.volumes }}
      volumes:
        {{- if and $secrets.externalSecretName $mountAsFiles.enabled }}
        - name: mlflow-secrets
          secret:
            secretName: {{ $secrets.externalSecretName }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}
{{- end -}}
