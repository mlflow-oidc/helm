{{- include "application.validateRedis" . -}}
{{- template "common.deployment" (list . "application.deployment") -}}
{{- define "application.deployment" -}}
{{- $secrets := default (dict) .Values.secrets -}}
{{- $mountAsFiles := default (dict) $secrets.mountAsFiles -}}
{{- /*
  Override the deployment only when secrets features require it:
  - secrets.externalSecretName adds a secretRef to envFrom
  - secrets.mountAsFiles adds env vars, volumeMount, and volume

  When neither is set, the common library handles everything natively
  (image, ports, args, envFrom, env, secretRefs, health checks, resources,
  volumeMounts, volumes).
*/ -}}
{{- if $secrets.externalSecretName }}
spec:
  template:
    spec:
      containers:
        - name: app
          image: "{{ default "ghcr.io/mlflow-oidc" .Values.image.registry }}/{{ .Values.image.name }}:{{ .Values.image.tag | default (include "common.chart.appVersion" .) }}"
          imagePullPolicy: {{ default "IfNotPresent" .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: {{ default "http" .Values.config.portName }}
              containerPort: {{ default "8080" .Values.config.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ template "common.fullname" . }}
            {{- if not $mountAsFiles.enabled }}
            - secretRef:
                name: {{ $secrets.externalSecretName }}
            {{- end }}
            {{ include "common.envvar.shared.configs" . | indent 12 }}
            {{ include "common.envvar.shared.secrets" . | indent 12 }}
          {{- if or $mountAsFiles.enabled .Values.env .Values.secretRefs }}
          env:
            {{- if $mountAsFiles.enabled }}
            - name: CONFIG_K8S_SECRETS_ENABLED
              value: "true"
            - name: CONFIG_K8S_SECRETS_PATH
              value: {{ $mountAsFiles.path | default "/var/run/secrets/mlflow-oidc-auth" | quote }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- range $envName, $ref := .Values.secretRefs }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.name }}
                  key: {{ $ref.key }}
            {{- end }}
          {{- end }}
          {{- $healthCheck := default (dict) .Values.healthCheck -}}
          {{- if eq (default "" $healthCheck.kind) "tcp" }}
          {{ include "common.healthcheck.liveness.tcp" . | nindent 10 }}
          {{ include "common.healthcheck.readiness.tcp" . | nindent 10 }}
          {{ include "common.healthcheck.startup.tcp" . | nindent 10 }}
          {{- else if ne (default "" $healthCheck.kind) "disabled" }}
          {{ include "common.healthcheck.liveness" . | nindent 10 }}
          {{ include "common.healthcheck.readiness" . | nindent 10 }}
          {{ include "common.healthcheck.startup" . | nindent 10 }}
          {{- end }}
          {{ include "common.resources" . | nindent 10 }}
          {{- if or $mountAsFiles.enabled .Values.volumeMounts }}
          volumeMounts:
            {{- if $mountAsFiles.enabled }}
            - name: mlflow-secrets
              mountPath: {{ $mountAsFiles.path | default "/var/run/secrets/mlflow-oidc-auth" }}
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or $mountAsFiles.enabled .Values.volumes }}
      volumes:
        {{- if $mountAsFiles.enabled }}
        - name: mlflow-secrets
          secret:
            secretName: {{ $secrets.externalSecretName }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}
{{- end -}}
